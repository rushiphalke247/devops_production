# Ansible Playbook - Setup Kubernetes Cluster (kubeadm)
# Run on both master and worker nodes
---
- name: Setup Kubernetes Prerequisites (Master + Worker)
  hosts: k8s_master,k8s_worker
  become: true

  tasks:
    - name: Disable swap
      shell: |
        swapoff -a
        sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab

    - name: Load kernel modules
      shell: |
        cat <<EOT | tee /etc/modules-load.d/k8s.conf
        overlay
        br_netfilter
        EOT
        modprobe overlay
        modprobe br_netfilter

    - name: Set sysctl params
      shell: |
        cat <<EOT | tee /etc/sysctl.d/k8s.conf
        net.bridge.bridge-nf-call-iptables  = 1
        net.bridge.bridge-nf-call-ip6tables = 1
        net.ipv4.ip_forward                 = 1
        EOT
        sysctl --system

    - name: Install containerd
      apt:
        name: containerd
        state: present
        update_cache: yes

    - name: Configure containerd
      shell: |
        mkdir -p /etc/containerd
        containerd config default | tee /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
        systemctl restart containerd
        systemctl enable containerd

    - name: Install Kubernetes packages
      shell: |
        apt-get update
        apt-get install -y apt-transport-https ca-certificates curl
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /" | tee /etc/apt/sources.list.d/kubernetes.list
        apt-get update
        apt-get install -y kubelet kubeadm kubectl
        apt-mark hold kubelet kubeadm kubectl
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

# =============================================================================
# Initialize Master Node
# =============================================================================
- name: Initialize Kubernetes Master
  hosts: k8s_master
  become: true

  tasks:
    - name: Initialize kubeadm
      shell: kubeadm init --pod-network-cidr=10.244.0.0/16 --ignore-preflight-errors=all
      register: kubeadm_output

    - name: Setup kubectl for ubuntu user
      shell: |
        mkdir -p /home/ubuntu/.kube
        cp /etc/kubernetes/admin.conf /home/ubuntu/.kube/config
        chown ubuntu:ubuntu /home/ubuntu/.kube/config

    - name: Install Flannel CNI
      become_user: ubuntu
      shell: kubectl apply -f https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml

    - name: Generate join command
      shell: kubeadm token create --print-join-command
      register: join_command

    - name: Save join command
      local_action: copy content="{{ join_command.stdout }}" dest="./join-command.sh"

# =============================================================================
# Join Worker Node to Cluster
# =============================================================================
- name: Join Worker to Cluster
  hosts: k8s_worker
  become: true

  tasks:
    - name: Copy join command
      copy:
        src: ./join-command.sh
        dest: /tmp/join-command.sh
        mode: "0755"

    - name: Join the cluster
      shell: sh /tmp/join-command.sh
