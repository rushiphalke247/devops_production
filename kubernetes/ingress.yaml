# =============================================================================
# Ingress - Path-based Routing
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: devops-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: devops-app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: node-frontend-svc
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: python-api-svc
                port:
                  number: 5000
